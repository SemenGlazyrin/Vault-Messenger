# Лимит памяти — при переполнении удаляем наименее используемые ключи.
# Это безопасно: в Redis у нас replay buffer, tickets, rate limit counters —
# всё восстанавливаемое.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Периодические снимки на диск
save 900 1
save 300 10
save 60 10000

loglevel notice

# Запрещаем опасные команды
rename-command FLUSHALL ""
rename-command FLUSHDB ""